name: android-build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '已有 tag（可留空：留空将用默认分支最新提交并自动生成 tag）'
        required: false
        default: ''
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 如果是手动触发且填写了 tag，则按该 tag 检出
      - name: Checkout by tag (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' }}
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      # 其他情况（没填 tag 的手动触发，或推 tag 触发），用默认行为
      - name: Checkout default ref
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag_name != '') }}
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          cache: true

      # 签名（若没有这些密钥，先把本段三步删掉，也能构建未签名包）
      - name: Android keystore
        id: keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: key.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      # 构建单 APK（不按 ABI 拆分）
      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

      # 发布 Release：手动触发且填写了 tag
      - name: Release (manual with tag)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          body: 自动构建的 Android APK（单包）
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布 Release：手动触发且未填写 tag（自动生成 tag）
      - name: Release (manual without tag -> auto tag)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name == '' }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: auto-build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Auto Build #${{ github.run_number }}
          body: 自动构建的 Android APK（单包）
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布 Release：推 tag 触发
      - name: Release (tag push)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 自动构建的 Android APK（单包）
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}