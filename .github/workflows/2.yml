name: android-build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '已有 tag（可留空：留空则用默认分支最新提交并自动生成 tag）'
        required: false
        default: ''
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout by tag (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' }}
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Checkout default ref
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.tag_name != '') }}
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          cache: true

      # 仅当存在签名密钥时才执行以下两步
      - name: Android keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        id: keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: key.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "storeFile=${{ steps.keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release if signing, else debug)
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Signing secrets detected. Building release APK..."
            flutter build apk --release
          else
            echo "No signing secrets. Building debug APK for testing..."
            flutter build apk --debug
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/*.apk

      # 仅当已签名时才发布 Release
      - name: Release (manual with tag)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' && secrets.KEYSTORE_BASE64 != '' }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          body: Android APK
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (manual without tag -> auto tag)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name == '' && secrets.KEYSTORE_BASE64 != '' }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: auto-build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Auto Build #${{ github.run_number }}
          body: Android APK
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (tag push)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64 != '' }}
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: Android APK
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}