name: android-fast-build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          cache: true

      # 生成临时 keystore，写入 android/key.properties（无需任何 Secrets）
      - name: Generate temp keystore
        run: |
          cd android
          keytool -genkeypair -v -storetype JKS -keystore app_tmp.jks -storepass 123456 -keypass 123456 -alias tempkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=CI, OU=CI, O=CI, L=Internet, S=NA, C=US"
          echo "storeFile=android/app_tmp.jks" > key.properties
          echo "storePassword=123456" >> key.properties
          echo "keyPassword=123456" >> key.properties
          echo "keyAlias=tempkey" >> key.properties

      - name: Flutter pub get
        run: flutter pub get

      # 先尝试 release，失败则自动回退 debug，确保成功产出 APK
      - name: Build APK (release -> debug fallback)
        shell: bash
        run: |
          echo "Trying release build..."
          if flutter build apk --release; then
            echo "Release build OK"
          else
            echo "Release build failed. Falling back to debug..."
            flutter build apk --debug
          fi
          echo "Done. APKs in build/app/outputs/flutter-apk:"
          ls -l build/app/outputs/flutter-apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn