name: app-build-android-only

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '已有 tag（可留空，留空则用默认分支最新）'
        required: false
        default: ''
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 有输入就按 tag 检出；没输入就用默认分支最新提交
          ref: ${{ inputs.tag_name != '' && format('refs/tags/{0}', inputs.tag_name) || github.ref }}

      # 签名（如不需要签名，可移除该段和 android/key.properties 相关配置）
      - name: 下载 Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: key.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 创建 key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          cache: true

      - name: 获取依赖
        run: flutter pub get

      # 只构建“单 APK”（不按 ABI 拆分）
      - name: 构建 APK
        run: flutter build apk --release

      - name: 上传到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

      # 如不需要发布 Release，可删掉这个步骤
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('auto-build-{0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Auto Build #{0}', github.run_number) }}
          body: '自动构建的 Android APK（单包）'
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}