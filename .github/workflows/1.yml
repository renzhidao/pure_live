name: app-build-android

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: false
        default: 'v1.0.0'
      split_abi:
        description: 'Split APK by ABI (true=多APK，false=单APK)'
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          # 兼容手动触发和推送 tag 两种场景
          ref: ${{ inputs.tag_name || github.ref_name }}

      # APK 签名
      - name: 下载 Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: key.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 创建 key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      # Java & Flutter
      - name: 设置 JAVA 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          cache: true

      - name: 获取依赖
        run: flutter pub get

      # 构建 APK（单 APK 或按 ABI 拆分）
      - name: 构建 APK
        shell: bash
        run: |
          if [ "${{ inputs.split_abi }}" = "true" ]; then
            flutter build apk --release --split-per-abi
          else
            flutter build apk --release
          fi

      # 上传构建产物
      - name: 上传 APK 至 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/*.apk

      # 读取版本信息（可选）
      - name: 读取版本信息
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/version.json
        continue-on-error: true

      # 发布 Release
      - name: 上传至 Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: ${{ inputs.tag_name || github.ref_name }}
          body: ${{ steps.version.outputs.content && fromJson(steps.version.outputs.content).version_desc || '自动构建的 Android 发行包' }}
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 输出任务状态
        if: always()
        run: echo "🍏 Android job's status is ${{ job.status }}."